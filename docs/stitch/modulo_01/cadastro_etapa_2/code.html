<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3e5653",
                        "background-light": "#f7f7f7",
                        "background-dark": "#171b1a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .form-input:focus {
            border-color: #3e5653 !important;
            box-shadow: 0 0 0 1px #3e5653 !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto bg-white dark:bg-slate-900 min-h-screen flex flex-col shadow-xl">
<!-- TopAppBar -->
<header class="flex items-center p-4 pb-2 justify-between border-b border-primary/10">
<button class="text-primary flex size-12 shrink-0 items-center justify-center hover:bg-primary/5 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">UNIQ Empresas</h2>
</header>
<!-- Progress Section -->
<div class="flex flex-col gap-3 p-4">
<div class="flex gap-6 justify-between">
<p class="text-primary text-base font-semibold leading-normal">Etapa 2 de 3</p>
<p class="text-slate-500 text-sm font-medium">66% completo</p>
</div>
<div class="rounded-full bg-primary/10 h-2 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 66%;"></div>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal">Dados da Empresa</p>
</div>
<main class="flex-1 overflow-y-auto pb-24">
<!-- Informações Gerais Section -->
<section class="px-4 py-2">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight pb-4 pt-2 border-b border-primary/5">Informações Gerais</h3>
<div class="flex flex-col gap-4 py-4">
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Nome da Empresa</span>
<input class="form-input w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-12 px-4 text-base focus:ring-primary focus:border-primary transition-all" placeholder="Nome Fantasia ou Razão Social" type="text"/>
</label>
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">CNPJ</span>
<input class="form-input w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-12 px-4 text-base focus:ring-primary focus:border-primary transition-all" placeholder="00.000.000/0000-00" type="text"/>
</label>
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Telefone Comercial</span>
<input class="form-input w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-12 px-4 text-base focus:ring-primary focus:border-primary transition-all" placeholder="(00) 0000-0000" type="tel"/>
</label>
<div class="grid grid-cols-1 gap-4">
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Ramo de Atividade</span>
<select class="form-select w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-12 px-4 text-base focus:ring-primary focus:border-primary transition-all">
<option disabled="" selected="" value="">Selecione um ramo</option>
<option>Tecnologia</option>
<option>Saúde</option>
<option>Educação</option>
<option>Varejo</option>
<option>Indústria</option>
<option>Serviços</option>
</select>
</label>
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Quantidade de Funcionários</span>
<select class="form-select w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-12 px-4 text-base focus:ring-primary focus:border-primary transition-all">
<option disabled="" selected="" value="">Selecione o porte</option>
<option>1 - 10</option>
<option>11 - 50</option>
<option>51 - 200</option>
<option>Acima de 200</option>
</select>
</label>
</div>
</div>
</section>
<!-- Endereço Section -->
<section class="px-4 py-2 mt-4">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight pb-4 border-b border-primary/5">Endereço</h3>
<div class="flex flex-col gap-4 py-4">
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">CEP</span>
<div class="relative">
<input class="form-input w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-12 px-4 text-base focus:ring-primary focus:border-primary transition-all" placeholder="00000-000" type="text"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-primary/60">search</span>
</div>
</label>
<div class="grid grid-cols-4 gap-4">
<label class="flex flex-col gap-2 col-span-3">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Logradouro</span>
<input class="form-input w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-12 px-4 text-base focus:ring-primary focus:border-primary transition-all" placeholder="Rua, Av, Praça..." type="text"/>
</label>
<label class="flex flex-col gap-2 col-span-1">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Nº</span>
<input class="form-input w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-12 px-4 text-base focus:ring-primary focus:border-primary transition-all" placeholder="123" type="text"/>
</label>
</div>
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Complemento (Opcional)</span>
<input class="form-input w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-12 px-4 text-base focus:ring-primary focus:border-primary transition-all" placeholder="Sala 101, Bloco A" type="text"/>
</label>
<label class="flex flex-col gap-2">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Bairro</span>
<input class="form-input w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-12 px-4 text-base focus:ring-primary focus:border-primary transition-all" placeholder="Seu bairro" type="text"/>
</label>
<div class="grid grid-cols-4 gap-4">
<label class="flex flex-col gap-2 col-span-3">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Cidade</span>
<input class="form-input w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-12 px-4 text-base focus:ring-primary focus:border-primary transition-all" placeholder="Nome da cidade" type="text"/>
</label>
<label class="flex flex-col gap-2 col-span-1">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">UF</span>
<select class="form-select w-full rounded-lg border-primary/20 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-12 px-4 text-base focus:ring-primary focus:border-primary transition-all">
<option>SP</option>
<option>RJ</option>
<option>MG</option>
<option>RS</option>
<option>PR</option>
<option>SC</option>
</select>
</label>
</div>
</div>
</section>
</main>
<!-- Fixed Footer Buttons -->
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-t border-primary/10 flex gap-4">
<button class="flex-1 flex items-center justify-center gap-2 h-12 rounded-xl border-2 border-primary text-primary font-bold hover:bg-primary/5 transition-colors">
                Voltar
            </button>
<button class="flex-[2] flex items-center justify-center gap-2 h-12 rounded-xl bg-primary text-white font-bold hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all">
                Próximo Passo
                <span class="material-symbols-outlined text-lg">chevron_right</span>
</button>
</footer>
</div>
</body></html>
